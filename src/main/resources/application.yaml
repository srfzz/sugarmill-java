spring:
  application:
    name: mill

  datasource:
    url: jdbc:postgresql://localhost:5432/sugarmill_pdb
    username: sugarmilldev
    password: 12345678
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Sugarmill
      maximum-pool-size: 10
      minimum-idle: 4
      connection-timeout: 20000
      idle-timeout: 300000
      keepalive-time: 30000


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: false
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false
    validate-on-migrate: true

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
    # Redis (uncomment when you wire it up)
    # data:
    #   redis:
    #     host: localhost
    #     port: 6379
    #     timeout: 2000ms
    #     lettuce:
    #       pool:
    #         max-active: 8
    #         max-idle: 4
    #         min-idle: 1

server:
  port: 8080
  server-header: " "
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  file:
    name: logs/sugarmill.log
  level:
    root: INFO
    com.gov.sugarmill: DEBUG
    org.flywaydb: INFO
    org.springframework.jdbc: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: "logs/sugarmill-%d{yyyy-MM-dd}.%i.log"
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

management:
  endpoints:
    web:
      exposure:
        include: health, info,loggers,logfile
  endpoint:
    health:
      show-details: when_authorized
    logfile:
      enabled: true