spring:
  application:
    name: mill

  datasource:
    url: jdbc:postgresql://localhost:5432/sugarmill_pdb
    username: sugarmilluser
    password: 12345678
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Sugarmill
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: false
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false
    validate-on-migrate: true

  mvc:
    throw-exception-if-no-handler-found: true

server:
  port: 8080
  server-header: " "
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    root: INFO
    com.gov.sugarmill: DEBUG
    org.flywaydb: INFO
    org.springframework.jdbc: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: "logs/sugarmill-%d{yyyy-MM-dd}.%i.log"
      max-file-size: 10MB
      max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized