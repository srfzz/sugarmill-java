services:
  db:
    image: postgres:16-alpine
    container_name: sugarmill_postgres_resume
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sugarmilluser
      POSTGRES_DB: sugarmill_pdb
      POSTGRES_PASSWORD: 12345678
    volumes:
      - sugarmill_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  sugarmill_pgdata: